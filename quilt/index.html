<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flying mewmer cat quilt</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <div class="pattern">
    <div class="square red s1"></div>
    <div class="square blue s2"></div>
    <div class="square orange s3"></div>
    <div class="square pink s4"></div>
    <div class="circle yellow c1"></div>
    <div class="circle purple c2"></div>
    <div class="circle cyan c3"></div>
    <div class="circle magenta c4"></div>
    <div class="triangle green t1"></div>
    <div class="triangle teal t2"></div>
    <div class="triangle lime t3"></div>
    <div class="triangle gold t4"></div>
    <div class="square violet s5"></div>
    <div class="circle coral c5"></div>
    <div class="square khaki s6"></div>
    <div class="circle navy c6"></div>
    <div class="triangle skyblue t5"></div>
    <div class="square salmon s7"></div>
    <div class="circle mint c7"></div>
    <div class="triangle lavender t6"></div>
    <div class="cat img1"></div>
    <div class="cat img2"></div>
</body>
</html>
